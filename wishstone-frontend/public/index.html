<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E8720C" />
    <meta name="description" content="Wishstone – India's Sacred Manifestation Stone" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 40'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='36' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23f5c842'/%3E%3Cstop offset='100%25' stop-color='%23c87d10'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='13,1 23,1 35,10 35,30 23,39 13,39 1,30 1,10' fill='none' stroke='url(%23g)' stroke-width='2.2' stroke-linejoin='round'/%3E%3Cline x1='13' y1='1' x2='18' y2='13' stroke='url(%23g)' stroke-width='1.6'/%3E%3Cline x1='23' y1='1' x2='18' y2='13' stroke='url(%23g)' stroke-width='1.6'/%3E%3Cline x1='1' y1='10' x2='18' y2='13' stroke='url(%23g)' stroke-width='1.6'/%3E%3Cline x1='35' y1='10' x2='18' y2='13' stroke='url(%23g)' stroke-width='1.6'/%3E%3Cline x1='18' y1='13' x2='18' y2='39' stroke='url(%23g)' stroke-width='1.6'/%3E%3C/svg%3E" />
    <meta name="referrer" content="no-referrer" />
    <title>WishStone — अपनी इच्छाएँ, अपनी नियति</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  </head>
  <body style="margin:0;background:#1a1b1e;">
    <div id="root"></div>
    <script>
      // Ensure all dynamically rendered images load without referrer restrictions
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('img').forEach(function(img) {
          img.referrerPolicy = 'no-referrer';
        });
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
              if (node.nodeName === 'IMG') node.referrerPolicy = 'no-referrer';
              if (node.querySelectorAll) node.querySelectorAll('img').forEach(function(img) { img.referrerPolicy = 'no-referrer'; });
            });
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
